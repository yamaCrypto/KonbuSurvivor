<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Rogue Shooter</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { border: 2px solid #333; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
// 縦型画面の設定
const GAME_WIDTH = 450;
const GAME_HEIGHT = 800;
const HUD_HEIGHT = 150; // 上部のステータス領域
const ROOM_WIDTH = GAME_WIDTH;
const ROOM_HEIGHT = GAME_HEIGHT - 300; // 下部にスティック領域を確保
const WALL_THICKNESS = 20;
const DOOR_SIZE = 80;
const MAP_SIZE = 3;

const config = {
    type: Phaser.AUTO,
    width: GAME_WIDTH,
    height: GAME_HEIGHT,
    parent: 'game-container',
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, enemies, bullets, walls, keys;
let currentRoom = { x: 1, y: 1 };
let enemiesStorage = {};
let isChangingRoom = false;
let lastFired = 0;

// ステータス
let playerStats = { hp: 100, maxHp: 100, mp: 50, maxMp: 50, gold: 0 };
let hudText, minimapGraphics;

// スティック用変数
let joystickBase, joystickThumb;
let joystickActive = false;
let moveVector = new Phaser.Math.Vector2(0, 0);

function preload() {}

function create() {
    // 物理グループ
    walls = this.physics.add.staticGroup();
    bullets = this.physics.add.group();
    enemies = this.physics.add.group();

    // プレイヤー（ゲームエリア中央）
    player = this.add.rectangle(GAME_WIDTH/2, GAME_HEIGHT/2, 25, 25, 0x00ff00);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    // キーボード（PC用）
    keys = this.input.keyboard.addKeys("W,A,S,D,UP,DOWN,LEFT,RIGHT");

    // --- HUD領域 (上部) ---
    const hudBg = this.add.rectangle(GAME_WIDTH/2, HUD_HEIGHT/2, GAME_WIDTH, HUD_HEIGHT, 0x000000).setDepth(100);
    hudText = this.add.text(20, 20, '', { fontSize: '18px', fill: '#fff' }).setDepth(101);
    minimapGraphics = this.add.graphics().setDepth(101);

    // --- バーチャルスティック (下部) ---
    const stickX = GAME_WIDTH / 2;
    const stickY = GAME_HEIGHT - 100;
    joystickBase = this.add.circle(stickX, stickY, 50, 0x555555, 0.5).setDepth(100);
    joystickThumb = this.add.circle(stickX, stickY, 25, 0xcccccc, 0.8).setDepth(101);

    this.input.on('pointerdown', (pointer) => {
        if (pointer.y > HUD_HEIGHT) joystickActive = true;
    });
    this.input.on('pointermove', (pointer) => {
        if (!joystickActive) return;
        const dist = Phaser.Math.Distance.Between(stickX, stickY, pointer.x, pointer.y);
        const angle = Phaser.Math.Angle.Between(stickX, stickY, pointer.x, pointer.y);
        const maxDist = 50;
        const clampedDist = Math.min(dist, maxDist);
        
        joystickThumb.x = stickX + Math.cos(angle) * clampedDist;
        joystickThumb.y = stickY + Math.sin(angle) * clampedDist;

        moveVector.setTo(Math.cos(angle), Math.sin(angle)).scale(clampedDist / maxDist);
    });
    this.input.on('pointerup', () => {
        joystickActive = false;
        joystickThumb.x = stickX;
        joystickThumb.y = stickY;
        moveVector.setTo(0, 0);
    });

    // 衝突判定
    this.physics.add.collider(player, walls);
    this.physics.add.overlap(bullets, enemies, handleBulletHit, null, this);

    setupRoom.call(this);
    updateUI();
}

function update(time) {
    if (isChangingRoom) return;

    // 移動入力（スティック優先、なければキーボード）
    let vx = moveVector.x;
    let vy = moveVector.y;

    if (vx === 0 && vy === 0) {
        if (keys.A.isDown || keys.LEFT.isDown) vx = -1;
        else if (keys.D.isDown || keys.RIGHT.isDown) vx = 1;
        if (keys.W.isDown || keys.UP.isDown) vy = -1;
        else if (keys.S.isDown || keys.DOWN.isDown) vy = 1;
    }

    const finalVel = new Phaser.Math.Vector2(vx, vy).normalize().scale(200);
    player.body.setVelocity(finalVel.x, finalVel.y);

    checkRoomChange.call(this);

    // 自動攻撃
    if (time > lastFired) {
        let closest = this.physics.closest(player, enemies.getChildren());
        if (closest) {
            fireBullet.call(this, player, closest);
            lastFired = time + 600;
        }
    }

    enemies.getChildren().forEach(e => this.physics.moveToObject(e, player, 60));
}

function updateUI() {
    hudText.setText(`HP: ${playerStats.hp}  MP: ${playerStats.mp}\nGOLD: ${playerStats.gold}`);
    
    // ミニマップ更新
    minimapGraphics.clear();
    const size = 15;
    const pad = 4;
    const offX = GAME_WIDTH - (size + pad) * MAP_SIZE - 20;
    const offY = 20;
    for (let y = 0; y < MAP_SIZE; y++) {
        for (let x = 0; x < MAP_SIZE; x++) {
            minimapGraphics.fillStyle(x === currentRoom.x && y === currentRoom.y ? 0x00ff00 : 0x444444, 0.8);
            minimapGraphics.fillRect(offX + x*(size+pad), offY + y*(size+pad), size, size);
        }
    }
}

function setupRoom() {
    walls.clear(true, true);
    enemies.clear(true, true);
    createWalls.call(this);

    const roomKey = `${currentRoom.x},${currentRoom.y}`;
    if (enemiesStorage[roomKey]) {
        enemiesStorage[roomKey].forEach(d => spawnEnemy.call(this, d.x, d.y, d.hp));
    } else {
        for(let i=0; i < Phaser.Math.Between(2, 4); i++) {
            spawnEnemy.call(this, Phaser.Math.Between(50, GAME_WIDTH-50), Phaser.Math.Between(HUD_HEIGHT+50, GAME_HEIGHT-250), 3);
        }
    }
}

function createWalls() {
    const hw = GAME_WIDTH / 2;
    const d = DOOR_SIZE / 2;
    const bottomLimit = GAME_HEIGHT - 200; // ゲームエリアの下端

    // 上
    if (currentRoom.y === 0) addWall.call(this, 0, HUD_HEIGHT, GAME_WIDTH, WALL_THICKNESS);
    else { addWall.call(this, 0, HUD_HEIGHT, hw-d, WALL_THICKNESS); addWall.call(this, hw+d, HUD_HEIGHT, hw-d, WALL_THICKNESS); }
    // 下
    if (currentRoom.y === MAP_SIZE-1) addWall.call(this, 0, bottomLimit, GAME_WIDTH, WALL_THICKNESS);
    else { addWall.call(this, 0, bottomLimit, hw-d, WALL_THICKNESS); addWall.call(this, hw+d, bottomLimit, hw-d, WALL_THICKNESS); }
    // 左
    if (currentRoom.x === 0) addWall.call(this, 0, HUD_HEIGHT, WALL_THICKNESS, bottomLimit-HUD_HEIGHT);
    else { addWall.call(this, 0, HUD_HEIGHT, WALL_THICKNESS, (bottomLimit-HUD_HEIGHT)/2-d); addWall.call(this, 0, (bottomLimit+HUD_HEIGHT)/2+d, WALL_THICKNESS, (bottomLimit-HUD_HEIGHT)/2-d); }
    // 右
    if (currentRoom.x === MAP_SIZE-1) addWall.call(this, GAME_WIDTH-WALL_THICKNESS, HUD_HEIGHT, WALL_THICKNESS, bottomLimit-HUD_HEIGHT);
    else { addWall.call(this, GAME_WIDTH-WALL_THICKNESS, HUD_HEIGHT, WALL_THICKNESS, (bottomLimit-HUD_HEIGHT)/2-d); addWall.call(this, GAME_WIDTH-WALL_THICKNESS, (bottomLimit+HUD_HEIGHT)/2+d, WALL_THICKNESS, (bottomLimit-HUD_HEIGHT)/2-d); }
}

function addWall(x, y, w, h) {
    let wall = this.add.rectangle(x + w/2, y + h/2, w, h, 0x444444);
    walls.add(wall);
}

function checkRoomChange() {
    const bottomLimit = GAME_HEIGHT - 200;
    let next = { ...currentRoom };
    let newPos = { x: player.x, y: player.y };

    if (player.x > GAME_WIDTH) { next.x++; newPos.x = 40; }
    else if (player.x < 0) { next.x--; newPos.x = GAME_WIDTH-40; }
    else if (player.y > bottomLimit) { next.y++; newPos.y = HUD_HEIGHT+40; }
    else if (player.y < HUD_HEIGHT) { next.y--; newPos.y = bottomLimit-40; }

    if (next.x !== currentRoom.x || next.y !== currentRoom.y) {
        if (next.x >= 0 && next.x < MAP_SIZE && next.y >= 0 && next.y < MAP_SIZE) {
            isChangingRoom = true;
            player.body.setVelocity(0);
            saveEnemies();
            this.cameras.main.fadeOut(200);
            this.cameras.main.once('camerafadeoutcomplete', () => {
                currentRoom = next; player.setPosition(newPos.x, newPos.y);
                setupRoom.call(this); updateUI();
                this.cameras.main.fadeIn(200);
                this.cameras.main.once('camerafadeincomplete', () => isChangingRoom = false);
            });
        }
    }
}

function saveEnemies() {
    const key = `${currentRoom.x},${currentRoom.y}`;
    enemiesStorage[key] = enemies.getChildren().map(e => ({ x: e.x, y: e.y, hp: e.hp }));
}

function spawnEnemy(x, y, hp) {
    const e = this.add.rectangle(x, y, 20, 20, 0xff0000);
    this.physics.add.existing(e);
    e.hp = hp; enemies.add(e);
}

function handleBulletHit(bullet, enemy) {
    bullet.destroy();
    enemy.hp -= PLAYER_DAMAGE;
    enemy.setFillStyle(0xffffff);
    this.time.delayedCall(50, () => { if(enemy.active) enemy.setFillStyle(0xff0000); });
    if (enemy.hp <= 0) {
        const amt = Phaser.Math.Between(5, 15);
        playerStats.gold += amt;
        updateUI();
        const t = this.add.text(enemy.x, enemy.y, `+${amt}G`, { fill: '#ffd700' }).setOrigin(0.5);
        this.tweens.add({ targets: t, y: t.y-50, alpha: 0, duration: 800, onComplete: () => t.destroy() });
        enemy.destroy();
    }
}

function fireBullet(src, tgt) {
    const b = this.add.rectangle(src.x, src.y, 8, 8, 0xffff00);
    bullets.add(b);
    this.physics.moveToObject(b, tgt, 350);
    this.time.addEvent({ delay: 1000, callback: () => { if(b.active) b.destroy(); } });
}
</script>
</body>
</html>
