<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Rogue - Thin Walls</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #game-container { border: 1px solid #333; width: 450px; height: 800px; position: relative; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
const C = {
    W: 450, H: 800, HUD: 160, BTM: 600,
    WALL: 12,  // 壁の厚みを24から12へ変更
    DOOR: 100, MAP: 5,
    P_SPD: 240, B_SPD_P: 500, B_SPD_E: 250,
    SPRITE_SIZE: 64
};

let player, enemies, pBullets, eBullets, walls, bgImage;
let currentRoom = { x: 2, y: 2 };
let roomData = {};
let isChanging = false;
let lastFired = 0;
let stats = { hp: 100, max: 100, mp: 50, gold: 0, weapon: 'RANGE', inv: false };
let joystick = { active: false, x: 0, y: 0, thumb: null };
let ui = {};

const config = {
    type: Phaser.AUTO,
    width: C.W, height: C.H,
    parent: 'game-container',
    backgroundColor: '#000000',
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    this.load.on('loaderror', (file) => console.warn("Missing:", file.key));
    this.load.image('konbu', 'img/konbu_64x64.png');
    this.load.image('enemy_img', 'img/mov_1.png');
    this.load.image('map_1', 'img/map/map_1.png');
    this.load.image('map_2', 'img/map/map_2.png');
    this.load.image('map_3', 'img/map/map_3.png');
}

function create() {
    setupUI.call(this);
    walls = this.physics.add.staticGroup();
    enemies = this.add.group();
    pBullets = this.add.group();
    eBullets = this.add.group();

    player = this.add.sprite(C.W / 2, C.H / 2, 'konbu');
    this.physics.add.existing(player);
    player.setDepth(10);
    player.body.setCollideWorldBounds(false);

    adjustSize(player);
    this.physics.add.collider(player, walls);
    setupRoom.call(this);
}

function adjustSize(sprite) {
    if (sprite.texture.key === '__MISSING' || !sprite.width) {
        sprite.setDisplaySize(C.SPRITE_SIZE, C.SPRITE_SIZE);
        sprite.setTint(sprite === player ? 0x00ff00 : 0xff0000);
    } else {
        const ratio = sprite.height / sprite.width;
        sprite.setDisplaySize(C.SPRITE_SIZE, C.SPRITE_SIZE * ratio);
    }
}

function update(time, delta) {
    if (isChanging || stats.hp <= 0) return;

    let vx = 0, vy = 0;
    const keys = this.input.keyboard.createCursorKeys();
    const wasd = this.input.keyboard.addKeys('W,A,S,D');

    if (joystick.active) {
        vx = joystick.x; vy = joystick.y;
    } else {
        if (keys.left.isDown || wasd.A.isDown) vx = -1; else if (keys.right.isDown || wasd.D.isDown) vx = 1;
        if (keys.up.isDown || wasd.W.isDown) vy = -1; else if (keys.down.isDown || wasd.S.isDown) vy = 1;
    }
    
    const move = new Phaser.Math.Vector2(vx, vy);
    if (move.length() > 0) {
        move.normalize().scale(C.P_SPD);
        player.setFlipX(vx > 0);
    }
    player.body.setVelocity(move.x, move.y);

    const dt = delta / 1000;
    [pBullets, eBullets].forEach(group => {
        group.getChildren().forEach(b => {
            if (!b.active) return;
            b.x += b.vx * dt; b.y += b.vy * dt;
            if (b.x < -20 || b.x > C.W+20 || b.y < C.HUD-20 || b.y > C.BTM+20) return b.destroy();

            if (group === pBullets) {
                enemies.getChildren().forEach(e => {
                    if (e.active && Phaser.Math.Distance.Between(b.x, b.y, e.x, e.y) < 30) {
                        e.hp--; e.setTint(0xff0000);
                        this.time.delayedCall(100, () => { if(e.active) e.clearTint(); });
                        if(e.hp <= 0) { stats.gold += 10; updateUI(); e.destroy(); }
                        b.destroy();
                    }
                });
            } else {
                if (!stats.inv && Phaser.Math.Distance.Between(b.x, b.y, player.x, player.y) < 25) {
                    onHit.call(this); b.destroy();
                }
            }
        });
    });

    enemies.getChildren().forEach(e => {
        if (!e.active) return;
        this.physics.moveToObject(e, player, 60);
        e.setFlipX(e.body.velocity.x > 0);
        if (time > e.nextFire) {
            fire.call(this, e, player, 0xff0000, eBullets);
            e.nextFire = time + 2500;
        }
    });

    if (time > lastFired && stats.weapon === 'RANGE') {
        const activeEnemies = enemies.getChildren().filter(e => e.active);
        const target = activeEnemies.length > 0 ? this.physics.closest(player, activeEnemies) : null;
        if (target) { fire.call(this, player, target, 0xffff00, pBullets); lastFired = time + 500; }
    }

    checkRoom.call(this);
}

function fire(from, to, color, group) {
    const b = this.add.circle(from.x, from.y, 6, color);
    group.add(b);
    const angle = Phaser.Math.Angle.Between(from.x, from.y, to.x, to.y);
    const speed = (group === pBullets) ? C.B_SPD_P : C.B_SPD_E;
    b.vx = Math.cos(angle) * speed;
    b.vy = Math.sin(angle) * speed;
}

function onHit() {
    stats.hp = Math.max(0, stats.hp - 10);
    updateUI();
    stats.inv = true;
    this.cameras.main.shake(100, 0.01);
    this.tweens.add({ targets: player, alpha: 0.3, duration: 100, yoyo: true, repeat: 5, 
        onComplete: () => { if(player.active) player.alpha = 1; stats.inv = false; } });
    if (stats.hp <= 0) {
        this.add.text(C.W/2, C.H/2, 'GAME OVER', { fontSize: 40, color: '#f00' }).setOrigin(0.5);
        this.physics.pause();
    }
}

function setupRoom() {
    if (bgImage) bgImage.destroy();
    [walls, enemies, pBullets, eBullets].forEach(g => g.clear(true, true));
    
    const key = `${currentRoom.x},${currentRoom.y}`;
    if (!roomData[key]) {
        roomData[key] = {
            mapId: Phaser.Math.Between(1, 3),
            enemies: Array.from({length: 3}, () => ({
                x: Phaser.Math.Between(100, C.W-100), 
                y: Phaser.Math.Between(C.HUD+100, C.BTM-100), 
                hp: 3
            }))
        };
    }

    const currentRoomInfo = roomData[key];
    bgImage = this.add.image(C.W/2, (C.HUD + C.BTM)/2, `map_${currentRoomInfo.mapId}`);
    bgImage.setDisplaySize(C.W, C.BTM - C.HUD);
    bgImage.setDepth(-1);

    // 壁作成 (厚みをC.WALL = 12で作成)
    const addW = (x, y, w, h) => walls.add(this.add.rectangle(x+w/2, y+h/2, w, h, 0x444444));
    const hw = C.W/2, ds = C.DOOR/2;
    
    // 上
    if(currentRoom.y === 0) addW(0, C.HUD, C.W, C.WALL);
    else { addW(0, C.HUD, hw-ds, C.WALL); addW(hw+ds, C.HUD, hw-ds, C.WALL); }
    // 下
    if(currentRoom.y === C.MAP-1) addW(0, C.BTM - C.WALL, C.W, C.WALL);
    else { addW(0, C.BTM - C.WALL, hw-ds, C.WALL); addW(hw+ds, C.BTM - C.WALL, hw-ds, C.WALL); }
    // 左
    if(currentRoom.x === 0) addW(0, C.HUD, C.WALL, C.BTM-C.HUD);
    else { const vh = C.BTM-C.HUD; addW(0, C.HUD, C.WALL, vh/2-ds); addW(0, C.HUD+vh/2+ds, C.WALL, vh/2-ds); }
    // 右
    if(currentRoom.x === C.MAP-1) addW(C.W-C.WALL, C.HUD, C.WALL, C.BTM-C.HUD);
    else { const vh = C.BTM-C.HUD; addW(C.W-C.WALL, C.HUD, C.WALL, vh/2-ds); addW(C.W-C.WALL, C.HUD+vh/2+ds, C.WALL, vh/2-ds); }

    currentRoomInfo.enemies.forEach(d => {
        const e = this.add.sprite(d.x, d.y, 'enemy_img');
        this.physics.add.existing(e);
        adjustSize(e);
        e.hp = d.hp; e.nextFire = this.time.now + 1000;
        enemies.add(e);
        e.body.setImmovable(true);
    });
    updateUI();
}

function checkRoom() {
    let nx = player.x, ny = player.y, changed = false;
    let next = { ...currentRoom };
    const sensor = 15;

    if (player.x < -sensor) { next.x--; nx = C.W - 35; changed = true; }
    else if (player.x > C.W + sensor) { next.x++; nx = 35; changed = true; }
    else if (player.y < C.HUD - sensor) { next.y--; ny = C.BTM - 35; changed = true; }
    else if (player.y > C.BTM + sensor) { next.y++; ny = C.HUD + 35; changed = true; }

    if (changed && next.x >= 0 && next.x < C.MAP && next.y >= 0 && next.y < C.MAP) {
        isChanging = true;
        roomData[`${currentRoom.x},${currentRoom.y}`].enemies = enemies.getChildren().map(e => ({x:e.x, y:e.y, hp:e.hp}));
        this.cameras.main.fadeOut(100);
        this.cameras.main.once('camerafadeoutcomplete', () => {
            currentRoom = next; player.setPosition(nx, ny);
            setupRoom.call(this); this.cameras.main.fadeIn(100);
            this.time.delayedCall(200, () => isChanging = false);
        });
    } else if (changed) {
        player.x = Phaser.Math.Clamp(player.x, 15, C.W-15);
        player.y = Phaser.Math.Clamp(player.y, C.HUD+15, C.BTM-15);
    }
}

function setupUI() {
    this.add.rectangle(C.W/2, C.HUD/2, C.W, C.HUD, 0x111111).setDepth(100);
    ui.bg = this.add.graphics().setDepth(101);
    ui.hp = this.add.text(25, 20, '', { fontSize: 14, fill: '#fff' }).setDepth(102);
    ui.mp = this.add.text(25, 60, '', { fontSize: 14, fill: '#fff' }).setDepth(102);
    ui.gold = this.add.text(25, 105, '', { fontSize: 16, fill: '#ffd700' }).setDepth(102);
    ui.map = this.add.graphics().setDepth(101);

    const sX = 110, sY = C.H - 110;
    this.add.circle(sX, sY, 60, 0x333333, 0.5).setDepth(100);
    joystick.thumb = this.add.circle(sX, sY, 30, 0xcccccc, 0.8).setDepth(101);

    this.input.on('pointerdown', p => { if(Phaser.Math.Distance.Between(p.x, p.y, sX, sY) < 70) joystick.active = true; });
    this.input.on('pointermove', p => {
        if(!joystick.active) return;
        const d = Math.min(Phaser.Math.Distance.Between(sX, sY, p.x, p.y), 60);
        const a = Phaser.Math.Angle.Between(sX, sY, p.x, p.y);
        joystick.thumb.setPosition(sX + Math.cos(a)*d, sY + Math.sin(a)*d);
        joystick.x = Math.cos(a) * (d/60); joystick.y = Math.sin(a) * (d/60);
    });
    this.input.on('pointerup', () => { joystick.active = false; joystick.thumb.setPosition(sX, sY); joystick.x = joystick.y = 0; });
    
    const btn = (x, y, txt, col, cb) => {
        const b = this.add.circle(x, y, 45, col, 0.8).setInteractive().setDepth(100);
        this.add.text(x, y, txt, { fontSize: 14, fill: '#fff' }).setOrigin(0.5).setDepth(101);
        b.on('pointerdown', cb);
    };
    btn(C.W-160, C.H-110, "WEAPON", 0x3a5afc, () => { stats.weapon = stats.weapon==='RANGE'?'MELEE':'RANGE'; updateUI(); });
    btn(C.W-60, C.H-110, "DASH", 0xfc3a5a, () => {
        if(stats.mp >= 10) { stats.mp -= 10; updateUI();
            const vec = player.body.velocity.clone().normalize().scale(800);
            player.body.setVelocity(vec.x, vec.y);
        }
    });
}

function updateUI() {
    ui.bg.clear();
    const draw = (y, v, m, c) => {
        ui.bg.fillStyle(0x000000, 0.5).fillRoundedRect(25, y, 220, 24, 8);
        if(v > 0) ui.bg.fillStyle(c, 1).fillRoundedRect(25, y, 220 * (v/m), 24, 8);
    };
    draw(20, stats.hp, stats.max, 0xe74c3c);
    draw(60, stats.mp, 50, 0x3498db);
    ui.hp.setText(`HP: ${stats.hp}`); ui.mp.setText(`MP: ${stats.mp}`);
    ui.gold.setText(`GOLD: ${stats.gold} | ${stats.weapon}`);
    ui.map.clear();
    for(let y=0; y<C.MAP; y++) {
        for(let x=0; x<C.MAP; x++) {
            ui.map.fillStyle(x===currentRoom.x && y===currentRoom.y ? 0x00ff00 : 0x444444, 0.8);
            ui.map.fillRoundedRect(C.W - 110 + x*16, 20 + y*16, 12, 12, 2);
        }
    }
}
</script>
</body>
</html>
